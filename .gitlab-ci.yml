stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  DEPLOY_TARGET:
    value: "staging"
    options:
      - "staging"
      - "production"
    description: "Deployment target selected when running a manual deploy job."

.python_template:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt

.deploy_template:
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "Deploying ${IMAGE_TAG} to ${ENVIRONMENT_NAME}"
    - echo "Deployment target parameter: ${DEPLOY_TARGET}"
    - echo "A real project would run kubectl/helm/ansible here with protected credentials."

lint:
  extends: .python_template
  stage: lint
  script:
    - ruff check app tests

test:
  extends: .python_template
  stage: test
  script:
    - pytest -q

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH

deploy_staging:
  extends: .deploy_template
  variables:
    ENVIRONMENT_NAME: staging
    APP_ENV: staging
  environment:
    name: staging
    url: https://staging.ops-weather.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

deploy_production:
  extends: .deploy_template
  variables:
    ENVIRONMENT_NAME: production
    APP_ENV: production
  environment:
    name: production
    url: https://ops-weather.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: manual
      allow_failure: false

