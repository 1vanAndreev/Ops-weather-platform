apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ops-weather-api
  namespace: ops-weather
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: ops-weather.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ops-weather-api
                port:
                  number: 80
